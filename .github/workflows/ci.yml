on:
  pull_request:
  push:
    branches: ["main"]

name: Rust

env:
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  fmt-crank-check:
    name: Format + check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Install packages (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libgtk-3-dev # libgtk-3-dev is used by rfd
          version: 1.0
          execute_install_scripts: true

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v2"
          shared-key: "brush"
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-workspace-crates: true

      - name: check --all-features
        run: cargo check --locked --workspace --all-features --all-targets

      - name: check --no-default-features
        run: cargo check --locked --workspace --no-default-features --all-targets

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: cargo doc
        run: cargo doc --workspace --no-deps --all-features

      - name: cargo doc --document-private-items
        run: cargo doc --workspace --document-private-items --no-deps --all-features

      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ---------------------------------------------------------------------------

  wasm-check:
    name: Check wasm32
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v2"
          shared-key: "brush-wasm"
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-workspace-crates: true

      # The browser build (brush-app / brush-js cdylibs) is only compiled for
      # wasm32; the host-only jobs above never exercise it. Check it here so a
      # wasm-only break can't ship green.
      - name: check wasm32 (browser crates)
        run: cargo check --locked -p brush-app -p brush-js --lib --target wasm32-unknown-unknown

      - name: check wasm32 (native MSL feature falls back to WGSL)
        run: cargo check --locked -p brush-app --lib --target wasm32-unknown-unknown --features native-msl

  # ---------------------------------------------------------------------------

  cargo-deny:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
          - target: aarch64-linux-android
          - target: wasm32-unknown-unknown
          - target: x86_64-pc-windows-msvc
          - target: x86_64-unknown-linux-musl

    name: cargo-deny ${{ matrix.target }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: "1.95.0"
          log-level: error
          command: check
          arguments: --target  ${{ matrix.target }}

  # ---------------------------------------------------------------------------

  tests:
    name: Run tests
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v2"
          shared-key: "brush"
          cache-workspace-crates: true
          cache-on-failure: true

      - name: Run tests (default WGSL codegen)
        run: cargo test --all

      - name: Run tests (all features, native MSL optimization preset)
        env:
          BRUSH_NATIVE_MSL_PRESET: "1"
        run: cargo test --all --all-features

      # This separate package build intentionally omits `--all-features`:
      # debug-validation keeps sparse SH gradients on the dense fallback.
      - name: Run native MSL production preset smoke
        env:
          BRUSH_NATIVE_MSL_PRESET: "1"
          CUBECL_DEBUG_OPTION: profile-medium
          CUBECL_DEBUG_LOG: ${{ runner.temp }}/native-msl-profile.log
        run: |
          test "$(uname -m)" = arm64
          cargo test --locked -p brush-c --features native-msl \
            test_train_and_save_ffi_short -- --nocapture
          grep -q 'saved_partials: Some(' "$CUBECL_DEBUG_LOG"
          grep -q 'SparseShAdamKernel' "$CUBECL_DEBUG_LOG"
          awk '
            /\[START_KERNEL_COMPILATION\]/ {
              block = 1; raster = 0; unchecked = 0; fine_tiles = 0
            }
            block && /RasterizeBackwardsKernel/ { raster = 1 }
            block && /mode: Unchecked/ { unchecked = 1 }
            block && /tile_height: 8,/ { fine_tiles = 1 }
            /\[END_KERNEL_COMPILATION\]/ {
              if (raster && unchecked && fine_tiles) found = 1
              block = 0
            }
            END { exit found ? 0 : 1 }
          ' "$CUBECL_DEBUG_LOG"

      - name: Run doc-tests
        run: cargo test --all --all-features --doc
